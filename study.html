<!DOCTYPE html>

<head>

    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --accent-color: #9d65ff;
            --secondary-color: #00f2d8;
            --error-color: #ff4d6d;
            --border-color: #333;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { max-width: 950px; width: 100%; }
        h1 { text-align: center; color: var(--accent-color); margin-bottom: 5px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 25px; }

        .chapter-menu {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            padding: 15px 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        button {
            padding: 10px 18px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            background-color: var(--card-bg);
            color: white;
            transition: 0.3s;
        }

        button:hover { background: #252525; transform: translateY(-2px); border-color: var(--accent-color); }
        button.active { background-color: var(--accent-color); border-color: var(--accent-color); }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }

        .q-text { line-height: 1.8; }

        input[type="text"] {
            background: #000;
            border: 1px solid #555;
            color: var(--secondary-color);
            padding: 4px 10px;
            border-radius: 4px;
            outline: none;
            width: 200px;
            font-size: 1em;
            vertical-align: middle;
        }

        .correct { border-color: var(--secondary-color) !important; background: #0a2b26 !important; }
        .incorrect { border-color: var(--error-color) !important; background: #2b0a0a !important; }

        .hint {
            color: #ffb86c;
            font-size: 0.9em;
            margin-top: 10px;
            padding: 10px;
            border-left: 3px solid var(--error-color);
            background: rgba(255, 77, 109, 0.1);
        }

        .hidden { display: none !important; }
    </style>
</head>

        function loadChapter(chapterNum, btnElement) {
            const buttons = document.querySelectorAll('.chapter-menu button');
            buttons.forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            const container = document.getElementById('quiz-container');
            const questions = database[chapterNum];
            
            container.innerHTML = questions.map((item, idx) => {
                let qFormatted = item.q;
                let count = 0;
                // Generate input boxes with NO validation until Enter is pressed
                while (qFormatted.includes("[BLANK]")) {
                    qFormatted = qFormatted.replace("[BLANK]", `<input type="text" id="ans-${chapterNum}-${idx}-${count}" onkeypress="handleCheck(event, ${chapterNum}, ${idx})">`);
                    count++;
                }

                return `
                <div class="card">
                    <div class="q-text">
                        <strong>#${idx + 1}</strong> — ${qFormatted}
                    </div>
                    <div id="fb-${chapterNum}-${idx}" style="font-weight:bold; margin-top:10px;"></div>
                    <div id="hint-${chapterNum}-${idx}" class="hint hidden">Correct Answer: <b>${item.a}</b></div>
                </div>`;
            }).join('');
        }

        function handleCheck(e, chap, idx) {
            if (e.key === 'Enter') {
                const feedback = document.getElementById(`fb-${chap}-${idx}`);
                const hint = document.getElementById(`hint-${chap}-${idx}`);
                const correctAnswer = database[chap][idx].a.toLowerCase();
                
                const inputs = document.querySelectorAll(`[id^="ans-${chap}-${idx}-"]`);
                const userValues = Array.from(inputs).map(i => i.value.trim().toLowerCase());
                
                // For multiple blanks like "1 and 0", we combine them with " and " to match database string
                const combinedUser = userValues.join(' and ');

                if (combinedUser === correctAnswer || (correctAnswer.includes('/') && correctAnswer.split('/').some(opt => opt.trim() === combinedUser))) {
                    inputs.forEach(i => { i.className = 'correct'; });
                    feedback.innerText = '✓ Correct';
                    feedback.style.color = 'var(--secondary-color)';
                    hint.classList.add('hidden');
                } else {
                    inputs.forEach(i => { i.className = 'incorrect'; });
                    feedback.innerText = '✗ Incorrect';
                    feedback.style.color = 'var(--error-color)';
                    hint.classList.remove('hidden');
                }
            }
        }
