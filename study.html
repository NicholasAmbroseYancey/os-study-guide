<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS Study Guide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>OS Study Guide</h1>
        <div class="subtitle">Select a chapter</div>

        <div class="chapter-menu">
            <button onclick="loadChapter(1, this)">Quiz 1</button>
            <button onclick="loadChapter(2, this)">Quiz 2</button>
            <button onclick="loadChapter(3, this)">Quiz 3</button>
            <button onclick="loadChapter(4, this)">Quiz 4</button>
            <button onclick="loadChapter(5, this)">Quiz 5</button>
            <button onclick="loadChapter(6, this)">Quiz 6</button>
            <button onclick="loadChapter(7, this)">Quiz 7</button>
            <button onclick="loadChapter(8, this)">Quiz 8</button>
            <button onclick="loadChapter(9, this)">Quiz 9</button>
            <button onclick="loadChapter(10, this)">Quiz 10</button>
            <button onclick="loadChapter(11, this)">Quiz 11</button>
            <button class="random-btn" onclick="showRandomControls(this)">&#127922; Random</button>
        </div>

        <div id="quiz-container">
            <div class="card" style="text-align:center; color:#666;">
                Select a chapter from the menu above to begin.
            </div>
        </div>
    </div>

    <!-- Random controls modal -->
        <div id="random-modal" class="modal-overlay hidden" aria-hidden="true">
            <div class="modal" role="dialog" aria-modal="true" aria-labelledby="random-modal-title">
                <h3 id="random-modal-title">Random Run &#8212; Select Count</h3>
                <div class="modal-body">
                    <label for="count-slider" style="color:#bbb; font-size:0.95rem; min-width:44px;">Count</label>
                    <input id="count-slider" type="range" min="1" max="1" value="1" style="flex:1">
                    <input id="count-input" type="number" min="1" value="1" style="width:72px; padding:6px; border-radius:6px; background:var(--card-bg); color:var(--text-color); border:1px solid var(--border-color)">
                </div>
                <div class="modal-actions">
                    <button class="close" onclick="hideRandomControls()">Cancel</button>
                    <button onclick="startRandomConfirmed()" style="background:var(--secondary-color); color:#000; border:none; padding:8px 12px; border-radius:8px; font-weight:700;">Begin</button>
                </div>
            </div>
        </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
